<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3Z" fill="#64748b"/></marker></defs><rect width="1400" height="760" fill="#f8fafc"/>
<g font-family="Arial,'PingFang SC'" fill="#0f172a"><text x="700" y="62" text-anchor="middle" font-size="34" font-weight="700">一件商品从入库到签收的库存状态变化</text>
<g stroke-width="3" text-anchor="middle"><rect x="75" y="250" width="210" height="120" rx="20" fill="#fef3c7" stroke="#d97706"/><text x="180" y="300" font-size="25" font-weight="700">采购 / 调拨在途</text><text x="180" y="340" font-size="18">货物尚未可售</text><rect x="355" y="250" width="210" height="120" rx="20" fill="#dcfce7" stroke="#16a34a"/><text x="460" y="300" font-size="25" font-weight="700">可用库存</text><text x="460" y="340" font-size="18">可以被订单占用</text><rect x="635" y="250" width="210" height="120" rx="20" fill="#dbeafe" stroke="#2563eb"/><text x="740" y="300" font-size="25" font-weight="700">预留 / 占用</text><text x="740" y="340" font-size="18">已承诺给订单</text><rect x="915" y="250" width="210" height="120" rx="20" fill="#ede9fe" stroke="#7c3aed"/><text x="1020" y="300" font-size="25" font-weight="700">发货在途</text><text x="1020" y="340" font-size="18">已离库、未签收</text><rect x="1195" y="250" width="150" height="120" rx="20" fill="#f1f5f9" stroke="#64748b"/><text x="1270" y="300" font-size="25" font-weight="700">签收</text><text x="1270" y="340" font-size="18">履约完成</text></g>
<g stroke="#64748b" stroke-width="4" marker-end="url(#a)"><line x1="285" y1="310" x2="347" y2="310"/><line x1="565" y1="310" x2="627" y2="310"/><line x1="845" y1="310" x2="907" y2="310"/><line x1="1125" y1="310" x2="1187" y2="310"/></g>
<g text-anchor="middle" font-size="19" fill="#475569"><text x="320" y="220">接收：在途减，可用增</text><text x="600" y="220">预留：可用减，占用增</text><text x="880" y="220">发货：占用减，发货在途增</text><text x="1160" y="220">签收：发货在途减</text></g>
<path d="M740 380 C740 530 500 530 460 380" fill="none" stroke="#ef4444" stroke-width="4" marker-end="url(#a)"/><text x="600" y="535" text-anchor="middle" font-size="21" fill="#991b1b">取消预留：占用减，可用增</text>
<text x="700" y="660" text-anchor="middle" font-size="22" fill="#475569">总额可能不变，但库存会在“可用、占用、在途”等状态之间迁移</text></g></svg>
