<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect width="1400" height="760" fill="#f8fafc"/><text x="700" y="62" text-anchor="middle" font-family="Arial,'PingFang SC'" font-size="34" font-weight="700" fill="#0f172a">Transactional Outbox：数据库提交成功后，消息不会悄悄丢失</text>
<g font-family="Arial,'PingFang SC'" text-anchor="middle"><rect x="70" y="265" width="190" height="100" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/><text x="165" y="325" font-size="25">业务请求</text><rect x="330" y="145" width="330" height="340" rx="22" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/><text x="495" y="195" font-size="26" font-weight="700">同一个本地事务</text><rect x="385" y="235" width="220" height="75" rx="14" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="495" y="280" font-size="22">保存预留单</text><rect x="385" y="345" width="220" height="75" rx="14" fill="#fff" stroke="#64748b" stroke-width="2"/><text x="495" y="390" font-size="22">保存 Outbox 事件</text><rect x="740" y="265" width="230" height="100" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="3"/><text x="855" y="310" font-size="23">后台发布器</text><text x="855" y="342" font-size="17">失败可重复扫描</text><rect x="1050" y="265" width="260" height="100" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/><text x="1180" y="310" font-size="23">消息队列</text><text x="1180" y="342" font-size="17">至少一次投递</text>
<g stroke="#64748b" stroke-width="4" marker-end="url(#a)"><line x1="260" y1="315" x2="325" y2="315"/><line x1="660" y1="315" x2="735" y2="315"/><line x1="970" y1="315" x2="1045" y2="315"/></g><rect x="1020" y="525" width="320" height="100" rx="18" fill="#f1f5f9" stroke="#64748b" stroke-width="3"/><text x="1180" y="568" font-size="23">消费者按 eventId 幂等</text><text x="1180" y="600" font-size="17">重复消息返回首次结果</text><path d="M1180 365 L1180 520" stroke="#64748b" stroke-width="4" marker-end="url(#a)"/><text x="620" y="620" font-size="22" fill="#475569">关键不是“消息绝不重复”，而是“业务数据与待发送事件一起落库，重复也能安全处理”</text></g></svg>
