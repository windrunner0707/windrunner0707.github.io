    <g stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#a)"><line x1="245" y1="196" x2="295" y2="196"/><line x1="470" y1="196" x2="520" y2="196"/><line x1="715" y1="188" x2="845" y2="145"/><line x1="715" y1="205" x2="845" y2="250"/><line x1="685" y1="232" x2="850" y2="350"/><line x1="1040" y1="141" x2="1105" y2="184"/><line x1="945" y1="292" x2="945" y2="345"/><line x1="850" y1="386" x2="715" y2="570"/><line x1="715" y1="606" x2="845" y2="606"/><line x1="1040" y1="606" x2="1165" y2="427"/></g>
    <text x="700" y="740" font-size="23" fill="#475569">只有合法状态转换才能修改库存；重试、取消和发货不再各自猜测当前状态</text>
