<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs><rect width="1400" height="820" fill="#f8fafc"/>
  <text x="700" y="62" text-anchor="middle" font-family="Arial,'PingFang SC'" font-size="34" font-weight="700" fill="#0f172a">预留单状态机：所有任务围绕同一套状态协作</text>
  <g font-family="Arial,'PingFang SC'" font-size="21" text-anchor="middle">
    <g fill="#e0f2fe" stroke="#0284c7" stroke-width="3"><rect x="75" y="160" width="170" height="72" rx="18"/><rect x="300" y="160" width="170" height="72" rx="18"/><rect x="525" y="160" width="190" height="72" rx="18"/></g>
    <text x="160" y="204">CREATED</text><text x="385" y="204">QUEUED</text><text x="620" y="204">PROCESSING</text>
    <g fill="#dcfce7" stroke="#16a34a" stroke-width="3"><rect x="850" y="105" width="190" height="72" rx="18"/><rect x="850" y="220" width="190" height="72" rx="18"/></g><text x="945" y="149">RESERVED</text><text x="945" y="264">PART_RESERVED</text>
